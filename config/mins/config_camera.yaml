%YAML:1.0 # need to specify the file type at the top!

cam:
  enabled: true
  max_n: 1 # 1: mono, 2: stereo
  use_stereo: false
  stereo_pair: [0, 1]
  do_calib_ext: true
  do_calib_int: true
  do_calib_dt: true
  n_pts: 500
  fast: 30
  grid_x: 20
  grid_y: 20
  min_px_dist: 15
  knn: 0.7
  downsample: false
  histogram_method: "HISTOGRAM" # NONE, HISTOGRAM, CLAHE
  max_slam: 50
  max_msckf: 100
  feat_rep: "GLOBAL_3D" # GLOBAL_3D GLOBAL_FULL_INVERSE_DEPTH
  init_cov_dt: 1e-4
  init_cov_ex_o: 1e-4
  init_cov_ex_p: 1e-4
  init_cov_in_k: 1e-2
  init_cov_in_c: 1e-1
  init_cov_in_r: 1e-6
  sigma_px: 2
  chi2_mult: 1

  # feature related
  fi_min_dist: 0.25
  fi_max_dist: 150
  fi_max_baseline: 2000
  fi_max_cond_number: 10000

  # ==================================================================
  # ==================================================================

cam0:
  timeoffset: 0.000
  T_imu_cam: #rotation from camera to IMU R_CtoI, position of camera in IMU p_CinI
    - [  0.0000, -0.1736,  0.9848, 0.20 ]
    - [ -1.0000,  0.0000,  0.0000, 0.00 ]
    - [  0.0000, -0.9848, -0.1736, 0.10 ]
    - [  0.0000,  0.0000,  0.0000, 1.00 ]
  distortion_coeffs: [-0.25, 0.12, -0.00028, 0.00005]
  distortion_model: radtan
  intrinsics: [269.97, 269.97, 320.0, 240.0]
  resolution: [640, 480]
  topic: "/target/camera"
