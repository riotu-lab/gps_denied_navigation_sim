%YAML:1.0

cam0:
# IMPORTANT, after transforming from the IMU link to the camera bse (ROS convention), you need to transform to camera optical link (ROS convention)  
  T_imu_cam: #rotation from camera to IMU R_CtoI, position of camera in IMU p_CinI
    - [  0.0000,  0.0000,  1.0000, 0.10 ]
    - [ -1.0000,  0.0000,  0.0000, -0.05 ]
    - [  0.0000, -1.0000,  0.0000, 0.00 ]
    - [  0.0000,  0.0000,  0.0000, 1.00 ]
  cam_overlaps: [1]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [450.0, 450.0, 376.0, 240.0]
  resolution: [752, 480]
  rostopic: "/target/stereo/left/image_raw"
cam1:
  T_imu_cam: #rotation from camera to IMU R_CtoI, position of camera in IMU p_CinI
    - [  0.0000,  0.0000,  1.0000, 0.10 ]
    - [ -1.0000,  0.0000,  0.0000, 0.05 ]
    - [  0.0000, -1.0000,  0.0000, 0.00 ]
    - [  0.0000,  0.0000,  0.0000, 1.00 ]
  cam_overlaps: [0]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  intrinsics: [450.0, 450.0, 376.0, 240.0]
  resolution: [752, 480]
  rostopic: "/target/stereo/right/image_raw"