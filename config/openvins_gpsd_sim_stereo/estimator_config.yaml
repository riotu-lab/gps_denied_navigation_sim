%YAML:1.0 # need to specify the file type at the top!

verbosity: "ALL" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT

use_fej: true # if first-estimate Jacobians should be used (enable for good consistency)
integration: "rk4" # discrete, rk4, analytical (if rk4 or analytical used then analytical covariance propagation is used)
use_stereo: true # if we have more than 1 camera, if we should try to track stereo constraints
max_cameras: 2 # how many cameras we have 1 = mono, 2 = stereo, >2 = binocular (all mono tracking)

calib_cam_extrinsics: true # if the transform between camera and IMU should be optimized R_ItoC, p_CinI
calib_cam_intrinsics: true # if camera intrinsics should be optimized (focal, center, distortion)
calib_cam_timeoffset: true # if timeoffset between camera and IMU should be optimized
calib_imu_intrinsics: false # if imu intrinsics should be calibrated
calib_imu_g_sensitivity: false # if gyroscope gravity sensitivity should be calibrated

max_clones: 11 # how many clones in the sliding window
max_slam: 75 # number of features in our state vector - increased from 50 for better feature tracking
max_slam_in_update: 40 # update can be split into sequential updates of batches - increased from 25
max_msckf_in_update: 50 # how many MSCKF features to use in the update - increased from 40
dt_slam_delay: 0.5 # delay before initializing (helps with stability) - reduced from 1.0

gravity_mag: 9.81 # magnitude of gravity in this location

feat_rep_msckf: "GLOBAL_3D"
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"
feat_rep_aruco: "GLOBAL_3D"

# zero velocity update parameters we can use
# we support either IMU-based or disparity detection.
try_zupt: true
zupt_chi2_multipler: 1
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 1.0
zupt_only_at_beginning: true

# ==================================================================
# ==================================================================

# Initialization parameters - updated for numerical stability during optimization
init_window_time: 1.5       # Longer window for more stable initialization
init_imu_thresh: 0.001      # Less strict IMU motion threshold
init_max_disparity: 2.0     # Increased for better feature disparity
init_max_features: 50       # Increased feature count for optimization stability

init_dyn_use: true          # Use dynamic initialization
init_dyn_mle_opt_calib: false  # Don't optimize calibration during initialization
init_dyn_mle_max_iter: 50   # Increased max iterations to allow convergence
init_dyn_mle_max_time: 1.0  # Increased max time for optimization
init_dyn_mle_max_threads: 6 # Thread count for optimization
init_dyn_num_pose: 6        # Increased from 5 for better constraints
init_dyn_min_deg: 0.025     # More relaxed rotation threshold

# These are crucial for numerical stability
init_dyn_inflation_ori: 10    # Reduced inflation for better numerical stability
init_dyn_inflation_vel: 10    # Reduced inflation for better numerical stability
init_dyn_inflation_bg: 10     # Reduced inflation for better numerical stability  
init_dyn_inflation_ba: 10     # Reduced inflation for better numerical stability
init_dyn_min_rec_cond: 1e-8   # Improved reciprocal condition threshold

init_dyn_bias_g: [ 0.0, 0.0, 0.0 ] # initial gyroscope bias guess
init_dyn_bias_a: [ 0.0, 0.0, 0.0 ] # initial accelerometer bias guess

# ==================================================================
# ==================================================================

record_timing_information: false # if we want to record timing information of the method
record_timing_filepath: "/tmp/traj_timing.txt" # https://docs.openvins.com/eval-timing.html#eval-ov-timing-flame

# if we want to save the simulation state and its diagional covariance
# use this with rosrun ov_eval error_simulation
save_total_state: false
filepath_est: "/tmp/ov_estimate.txt"
filepath_std: "/tmp/ov_estimate_std.txt"
filepath_gt: "/tmp/ov_groundtruth.txt"

# ==================================================================
# ==================================================================

# our front-end feature tracking parameters - optimized for eigenvalue issues
use_klt: true # if true we will use KLT, otherwise use a ORB descriptor + robust matching
num_pts: 300 # number of points (per camera)
fast_threshold: 5 # Increased from 1 for better corner quality
grid_x: 10 # Reduced from 15 for fewer but better features
grid_y: 10 # Reduced from 15 for fewer but better features
min_px_dist: 8 # Increased from 2 for better feature separation
knn_ratio: 0.70 # Reduced from 0.90 for stricter matching
track_frequency: 20.0 # Reduced to capture fewer but more distinct frames
downsample_cameras: false # will downsample image in half if true
num_opencv_threads: 4 # -1: auto, 0-1: serial, >1: number of threads
histogram_method: "HISTOGRAM" # Changed from CLAHE to HISTOGRAM for better feature consistency

# aruco tag tracker for the system
# DICT_6X6_1000 from https://chev.me/arucogen/
use_aruco: false
num_aruco: 1024
downsize_aruco: true

# ==================================================================
# ==================================================================

# camera noises and chi-squared threshold multipliers
up_msckf_sigma_px: 1
up_msckf_chi2_multipler: 1
up_slam_sigma_px: 1
up_slam_chi2_multipler: 1
up_aruco_sigma_px: 1
up_aruco_chi2_multipler: 1

# masks for our images
use_mask: false

# imu and camera spacial-temporal
# imu config should also have the correct noise values
relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"

# Timing thresholds for input data to handle out-of-order measurements
max_clone_age: 30.0        # Increased from 15.0 to 30.0 seconds
max_slam_age: 60.0         # How old a slam landmark can be in seconds
max_msckf_age: 60.0        # How old a msckf feature can be in seconds
# Max time offset allowed
max_time_offset: 1.0       # How much time offset we allow as an initial guess

# ==================================================================
# ==================================================================
# Core algorithm parameters

# If we should use fej or msckf (if not msckf, then it is fej)
use_fej: true

# If we should use imu message averaging or not
use_imu_average: true

# If we should use exactly the imu timing to integrate over
imu_integration_sigma: 1.0e-8

# Should we reject MSC KF features that fail a mahalanobis distance check?
use_kf_mahalanobis: false
# Chi squared threshold multiplier for this check
kf_mahalanobis_thresh: 16.812

# Noise values
gyroscope_noise_density: 1.0e-3            # 1.6968e-04
accelerometer_noise_density: 1.0e-3       # 2.0000e-3
gyroscope_random_walk: 1.0e-5              # 1.9393e-05
accelerometer_random_walk: 1.0e-4          # 3.0000e-3

# EKF observation buffer current size
ekf_buffer_max_size: 10000

# EKF processing plane
use_plane: false
plane_constraint: [0.0, 0.0, 1.0, 0.0]

# ==================================================================
# ==================================================================
# Feature tracking settings

quality_min: 0.001                # Minimum quality of KLT points
quality_max: 0.5                  # Maximum quality of KLT points (lower is better)
min_px_dist: 2                    # Minimum distance between tracked points (pixels)
max_fts: 200                      # How many points we want to track at each frame (split between all cameras)

# Feature gridding
feat_gridding: true               # If true, will enforce features are tracked on a grid
grid_x: 12                        # Grid x size, 10 would mean 10 boxes
grid_y: 10                        # Grid y size, 10 would mean 10 boxes
grid_num_max: 3                   # Max number of features to track per grid location
grid_min_feature_per_grid: 0      # Min number of features before we try to add new features per grid (0 = empty has n)

# FAST detector settings
fast_threshold: 8                 # Fast corner detector threshold
fast_nms_min: 5                   # Fast non-max suppression size (smaller is more dense detections)

# KLT Tracker settings
win_size: [15, 15]                # KLT window size, default [21,21]
fast_threshold_delta: 5           # Threshold delta on re-detection if we have fewer than X% of max features
pyr_lvl: 3                        # How many pyramid levels to track on (5 = multi-scale tracking)

# Feature histogram equalization before tracking
histogram_method: "HISTOGRAM"     # NONE, HISTOGRAM, CLAHE
histogram_clahe_clip: 5.0         # CLAHE clip limit
histogram_clahe_grid: 2           # CLAHE grid size

# Affine tracking, if we should check for affine deformations
track_frequency: 1                # How often to track features? Min 1, max 10
max_templates: 1                  # Maximum number of templates to check

# KLT Tracker settings for stereo cam
win_size_stereo: [15, 15]         # KLT window size for stereo tracking, default [21,21]
pyr_lvl_stereo: 3                 # How many pyramid levels for stereo

# ==================================================================
# ==================================================================



