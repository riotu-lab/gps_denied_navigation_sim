%YAML:1.0 # need to specify the file type at the top!

# =============================================================================
# Core system settings
# =============================================================================

verbosity: "INFO" # ALL, DEBUG, INFO, WARNING, ERROR, SILENT

# Core estimation options
use_fej: true                     # First-estimate Jacobians for consistency
integration: "rk4"                # Integration: discrete, rk4, analytical
use_stereo: true                  # Enable stereo constraints
max_cameras: 2                    # Number of cameras: 2 for stereo

# Calibration options (what to optimize online)
calib_cam_extrinsics: false       # Don't optimize camera-to-IMU transform (more stable)
calib_cam_intrinsics: false       # Don't optimize camera intrinsics (more stable)
calib_cam_timeoffset: false       # Don't optimize camera-IMU time offset (more stable)
calib_imu_intrinsics: false       # Don't optimize IMU intrinsics
calib_imu_g_sensitivity: false    # Don't optimize gyro gravity sensitivity

# State size limits
max_clones: 11                    # Max poses in sliding window
max_slam: 50                      # Max SLAM features in state
max_slam_in_update: 25            # Max SLAM features per update
max_msckf_in_update: 40           # Max MSCKF features per update
dt_slam_delay: 1.0                # Initialization delay in seconds

# Gravity and coordinate representation
gravity_mag: 9.81                 # Gravity magnitude
feat_rep_msckf: "GLOBAL_3D"       # MSCKF feature representation
feat_rep_slam: "ANCHORED_MSCKF_INVERSE_DEPTH"  # SLAM feature representation
feat_rep_aruco: "GLOBAL_3D"       # ArUco feature representation

# =============================================================================
# Initialization parameters (crucial)
# =============================================================================

# Feature initialization thresholds
init_min_features: 10             # Reduced: Minimum features for initialization
init_max_features: 30             # Maximum features to use
init_max_disparity: 3.0           # Increased: Maximum feature disparity 
init_window_time: 2.0             # Increased: Time window for initialization

# Motion thresholds
init_imu_thresh: 0.04             # Reduced: Minimum IMU motion required

# Dynamic initialization options (MLE-based)
init_dyn_use: true                # Use dynamic initialization
init_dyn_mle_opt_calib: false     # Don't optimize calibration during init
init_dyn_mle_max_iter: 20         # Max iterations for initialization
init_dyn_mle_max_time: 0.5        # Max seconds for initialization
init_dyn_mle_max_threads: 4       # Number of threads to use
init_dyn_num_pose: 4              # Reduced: Number of poses needed
init_dyn_min_deg: 0.08            # Reduced: Minimum motion in degrees

# Numerical stability parameters
init_dyn_inflation_ori: 10        # Increased: Orientation inflation
init_dyn_inflation_vel: 10        # Increased: Velocity inflation
init_dyn_inflation_bg: 10        # Increased: Gyro bias inflation
init_dyn_inflation_ba: 10        # Increased: Accel bias inflation
init_dyn_min_rec_cond: 1e-6       # Increased: Minimum reciprocal condition

# Initial biases
init_dyn_bias_g: [0.0, 0.0, 0.0]  # Initial gyro bias
init_dyn_bias_a: [0.0, 0.0, 0.0]  # Initial accel bias

# =============================================================================
# Feature tracking parameters
# =============================================================================

# Tracking method and point count
use_klt: true                     # Use KLT tracker
num_pts: 200                      # Increased: Points to track per camera
downsample_cameras: false         # Don't downsample images
num_opencv_threads: 4             # OpenCV threads

# Feature detection params
fast_threshold: 8                 # Reduced: FAST corner threshold for more features
grid_x: 8                         # Grid size X
grid_y: 8                         # Grid size Y
min_px_dist: 10                   # Minimum pixel distance

# KLT params
track_frequency: 1                # Track every frame
knn_ratio: 0.85                   # KNN matching ratio
histogram_method: "HISTOGRAM"     # Image enhancement: NONE, HISTOGRAM, CLAHE

# =============================================================================
# Noise and threshold parameters
# =============================================================================

# Sensor noise values - increased for more robustness
gyroscope_noise_density: 2.0e-2   # Increased: Gyroscope white noise
accelerometer_noise_density: 2.0e-2  # Increased: Accelerometer white noise
gyroscope_random_walk: 2.0e-4     # Increased: Gyroscope random walk
accelerometer_random_walk: 2.0e-3  # Increased: Accelerometer random walk

# Outlier rejection - increased thresholds for more robustness
use_kf_mahalanobis: true          # Use Mahalanobis distance for outlier rejection
kf_mahalanobis_thresh: 25.0       # Increased: Mahalanobis distance threshold
up_msckf_sigma_px: 3.0            # Increased: MSCKF feature noise (pixels)
up_msckf_chi2_multipler: 2.0      # Increased: MSCKF chi-squared multiplier
up_slam_sigma_px: 3.0             # Increased: SLAM feature noise (pixels)
up_slam_chi2_multipler: 2.0       # Increased: SLAM chi-squared multiplier
up_aruco_sigma_px: 2.0            # Increased: ArUco feature noise (pixels)
up_aruco_chi2_multipler: 2.0      # Increased: ArUco chi-squared multiplier

# Zero velocity detection (disabled for stability)
try_zupt: false                   # Disable zero velocity detection
zupt_chi2_multipler: 1.0
zupt_max_velocity: 0.1
zupt_noise_multiplier: 10
zupt_max_disparity: 1.0
zupt_only_at_beginning: true

# =============================================================================
# Timing parameters
# =============================================================================

# Time offset and buffer sizes
max_clone_age: 30.0              # Maximum pose age (seconds)
max_slam_age: 60.0               # Maximum SLAM feature age (seconds)
max_msckf_age: 60.0              # Maximum MSCKF feature age (seconds)
max_time_offset: 0.5             # Maximum sensor time offset

# IMU integration
use_imu_average: true            # Average IMU measurements
imu_integration_sigma: 1.0e-7    # IMU integration sigma

# =============================================================================
# Config file references
# =============================================================================

# Related config files
relative_config_imu: "kalibr_imu_chain.yaml"
relative_config_imucam: "kalibr_imucam_chain.yaml"

# =============================================================================
# Recording/debugging options
# =============================================================================

# Mask and recording
use_mask: false                   # Don't use feature mask
use_aruco: false                  # Don't use ArUco tags
num_aruco: 1024
downsize_aruco: true

# Debug recording
record_timing_information: false
save_total_state: false



